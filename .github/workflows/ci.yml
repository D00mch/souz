name: CI

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Assemble
        run: ./gradlew assemble

      - name: Run JVM tests
        run: ./gradlew :composeApp:cleanJvmTest :composeApp:jvmTest
