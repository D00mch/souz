name: DMG-Builds

on:
  workflow_dispatch:

jobs:
  package-dmg:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-latest
            architecture: x86-64
            host: macos-latest

          - name: macos-latest
            architecture: arm64
            host: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - name: Build release DMGs (RU/EN)
        run: ./gradlew :composeApp:clean packageRuReleaseDmg packageEnReleaseDmg

      - name: Upload DMGs
        uses: actions/upload-artifact@v4
        with:
          name: dmgs-${{ matrix.arch }}
          path: |
            composeApp/build/compose/binaries/**/*.dmg
