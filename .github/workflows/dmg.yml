name: DMG-Builds

on:
  workflow_dispatch:

jobs:
  package-dmg:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
            edition: ru
            package_task: packageReleaseDmg
          - runner: macos-latest
            arch: arm64
            edition: en
            package_task: packageReleaseDmg
          - runner: macos-latest
            arch: x64
            edition: ru
            package_task: packageReleaseDmg
          - runner: macos-latest
            arch: x64
            edition: en
            package_task: packageReleaseDmg

    runs-on: ${{ matrix.runner }}

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - name: Build ${{ matrix.edition }} release DMG
        run: ./gradlew :desktopApp:clean :desktopApp:${{ matrix.package_task }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}-${{ matrix.edition }}
          path: |
            desktopApp/build/compose/binaries/**/*.dmg
